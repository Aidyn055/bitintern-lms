server:
  port: 8082

spring:
  application:
    name: bitIntern

  datasource:
    url: jdbc:postgresql://localhost:5433/lms_db
    username: lms_user
    password: lms_password
    driver-class-name: org.postgresql.Driver

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/bitintern-realm
  keycloak:
    auth-server-url: http://localhost:8081
    realm: bitintern-realm
    client-id: bitintern-client
    client-secret: sgvsldxzrOtkAeDzm3LjRXwenCC55NiB

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

logging:
  level:
    BitlabAcademycom:
      example:
        bitIntern: DEBUG

springdoc:
  swagger-ui:
    # Теперь Swagger будет доступен по адресу: http://localhost:8082/swagger-ui.html
    path: /swagger-ui.html
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs